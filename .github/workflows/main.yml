name: Config Auto Forwarder

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '7,22,37,52 * * * *'
    
jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # مرحله جدید: تولید کلید زمان‌دار (بر اساس سال و شماره هفته) برای ذخیره کش
      - name: Get Date for Cache Key
        id: get-date
        run: echo "date=$(date +'%Y-%U')" >> $GITHUB_ENV
        
      # فراخوانی کش (اگر وجود داشته باشد)
      - name: Cache GeoIP Databases
        id: cache-geoip
        uses: actions/cache@v3
        with:
          path: '*.mmdb'
          key: geoip-db-${{ env.date }}
          
      # دانلود فایل‌ها فقط در صورتی که کش پیدا نشود (مثلاً در شروع هفته جدید)
      - name: Download GeoIP Databases
        if: steps.cache-geoip.outputs.cache-hit != 'true'
        run: |
          wget -O GeoLite2-Country.mmdb "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"
          wget -O GeoLite2-ASN.mmdb "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb"

      - name: Run Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TARGET_CHANNEL: ${{ secrets.TARGET_CHANNEL }}
        run: python main.py

      - name: Commit History
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt sub/ 
          git commit -m "Auto-update history and sub [skip ci]" || echo "No new configs, nothing to commit"
          git pull --rebase origin main
          git push
